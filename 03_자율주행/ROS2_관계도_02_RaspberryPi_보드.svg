<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Raspberry Pi 보드 내부 ROS 2 노드·토픽 관계도</title>
  <desc id="desc">Raspberry Pi의 control container와 watchdog container, 센서, actuator, 안전 출력 관계</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#52606d"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#c62828"/></marker>
    <style>
      text{font-family:"Noto Sans KR","Malgun Gothic",Arial,sans-serif;fill:#172b4d}.title{font-size:34px;font-weight:800}.subtitle{font-size:18px;fill:#52606d}.section{font-size:21px;font-weight:700}.node{fill:#ebf9ef;stroke:#23834a;stroke-width:2}.sensor{fill:#eef1f4;stroke:#607080;stroke-width:2}.topic{fill:#fff7df;stroke:#c48a00;stroke-width:2}.safety{fill:#fff0f0;stroke:#c62828;stroke-width:2}.external{fill:#eaf2ff;stroke:#2563a6;stroke-width:2}.container{fill:#f8fff9;stroke:#74b98b;stroke-width:2.5;stroke-dasharray:10 7}.watchbox{fill:#fffafa;stroke:#df7777;stroke-width:2.5;stroke-dasharray:10 7}.label{font-size:17px;font-weight:700;text-anchor:middle}.small{font-size:14px;font-weight:500;text-anchor:middle;fill:#52606d}.edge{fill:none;stroke:#52606d;stroke-width:2.2;marker-end:url(#arrow)}.rededge{fill:none;stroke:#c62828;stroke-width:2.8;marker-end:url(#arrowRed)}.legend{font-size:14px;fill:#334e68}
    </style>
  </defs>
  <rect width="1600" height="1050" fill="#ffffff"/>
  <text x="70" y="62" class="title">02. Raspberry Pi 보드 내부 ROS 2 관계</text>
  <text x="70" y="94" class="subtitle">Ubuntu 24.04 host · Docker ROS 2 Humble · 센서 피드백 · actuator 출력 · 독립 watchdog</text>

  <!-- Incoming from Jetson -->
  <rect x="70" y="135" width="305" height="100" rx="14" class="external"/><text x="222" y="168" class="label">Jetson에서 수신</text><text x="222" y="195" class="small">/vehicle/target_cmd · VehicleCommand</text><text x="222" y="218" class="small">reliable · depth 1 · lifespan</text>
  <rect x="425" y="135" width="305" height="100" rx="14" class="external"/><text x="577" y="168" class="label">Jetson에서 수신</text><text x="577" y="195" class="small">/system/heartbeat/jetson · Heartbeat</text><text x="577" y="218" class="small">best effort · depth 1</text>

  <!-- Control container -->
  <rect x="45" y="270" width="1060" height="650" rx="24" class="container"/>
  <text x="75" y="308" class="section">rpi_control container · network_mode: host</text>

  <rect x="90" y="350" width="190" height="90" rx="14" class="sensor"/><text x="185" y="383" class="label">AS5600 / Encoder</text><text x="185" y="410" class="small">I²C 또는 GPIO</text>
  <rect x="330" y="350" width="245" height="90" rx="14" class="node"/><text x="452" y="383" class="label">wheel_encoder_node</text><text x="452" y="410" class="small">unwrap · velocity · odom</text>
  <rect x="625" y="350" width="220" height="90" rx="14" class="topic"/><text x="735" y="382" class="label">/wheel/odom</text><text x="735" y="409" class="small">nav_msgs/Odometry</text>
  <path d="M280 395H330" class="edge"/><path d="M575 395H625" class="edge"/>

  <rect x="90" y="490" width="190" height="90" rx="14" class="sensor"/><text x="185" y="523" class="label">BNO055 / BNO085</text><text x="185" y="550" class="small">I²C 또는 UART</text>
  <rect x="330" y="490" width="245" height="90" rx="14" class="node"/><text x="452" y="523" class="label">imu_node</text><text x="452" y="550" class="small">ENU · covariance · health</text>
  <rect x="625" y="490" width="220" height="90" rx="14" class="topic"/><text x="735" y="522" class="label">/imu/data</text><text x="735" y="549" class="small">sensor_msgs/Imu</text>
  <path d="M280 535H330" class="edge"/><path d="M575 535H625" class="edge"/>

  <rect x="90" y="635" width="190" height="90" rx="14" class="sensor"/><text x="185" y="668" class="label">NC E-stop 접점</text><text x="185" y="695" class="small">normally closed</text>
  <rect x="330" y="635" width="245" height="90" rx="14" class="node"/><text x="452" y="668" class="label">estop_node</text><text x="452" y="695" class="small">debounce · 상태 보고</text>
  <rect x="625" y="635" width="220" height="90" rx="14" class="topic"/><text x="735" y="667" class="label">/safety/estop</text><text x="735" y="694" class="small">Bool · transient local</text>
  <path d="M280 680H330" class="edge"/><path d="M575 680H625" class="edge"/>

  <rect x="330" y="775" width="290" height="110" rx="14" class="node"/><text x="475" y="810" class="label">actuator_controller_node</text><text x="475" y="837" class="small">sequence · expiry · NaN · 범위 검사</text><text x="475" y="862" class="small">속도 PID · 조향 pulse · 유일한 출력 소유자</text>
  <rect x="680" y="775" width="220" height="110" rx="14" class="topic"/><text x="790" y="810" class="label">/vehicle/feedback</text><text x="790" y="837" class="small">ActuatorStatus</text><text x="790" y="862" class="small">applied sequence · fault</text>
  <path d="M222 235V250H300V760H475V775" class="edge"/><path d="M620 830H680" class="edge"/>

  <rect x="935" y="350" width="130" height="90" rx="14" class="sensor"/><text x="1000" y="382" class="label">Motor</text><text x="1000" y="409" class="small">PWM · DIR</text>
  <rect x="935" y="490" width="130" height="90" rx="14" class="sensor"/><text x="1000" y="522" class="label">PCA9685</text><text x="1000" y="549" class="small">MG996R</text>
  <path d="M620 810H900V395H935" class="edge"/><path d="M620 850H880V535H935" class="edge"/>

  <!-- Watchdog container -->
  <rect x="1140" y="270" width="415" height="650" rx="24" class="watchbox"/>
  <text x="1170" y="308" class="section">rpi_watchdog container</text>
  <rect x="1190" y="365" width="315" height="135" rx="14" class="safety"/><text x="1347" y="400" class="label">safety_watchdog_node</text><text x="1347" y="428" class="small">target_cmd · heartbeat · E-stop</text><text x="1347" y="454" class="small">CLOCK_MONOTONIC 200ms cutoff</text><text x="1347" y="480" class="small">fault latch · 수동 reset</text>
  <path d="M375 185H1080V410H1190" class="edge"/><path d="M730 185H1110V450H1190" class="edge"/><path d="M845 680H1130V480H1190" class="edge"/>

  <rect x="1190" y="560" width="315" height="100" rx="14" class="safety"/><text x="1347" y="595" class="label">별도 Driver EN line</text><text x="1347" y="622" class="small">외부 pull-down · 기본 LOW</text><text x="1347" y="645" class="small">actuator PWM과 다른 소유권</text>
  <path d="M1347 500V560" class="rededge"/>
  <path d="M1190 610H1090V395H1065" class="rededge"/>

  <rect x="1190" y="720" width="315" height="100" rx="14" class="node"/><text x="1347" y="755" class="label">rpi_monitor_node</text><text x="1347" y="782" class="small">heartbeat · CPU · I²C · loop age</text><text x="1347" y="805" class="small">/system/heartbeat/rpi</text>

  <rect x="1190" y="850" width="315" height="85" rx="14" class="sensor"/><text x="1347" y="883" class="label">외부 안전 회로</text><text x="1347" y="910" class="small">pulse-loss cutoff · NC E-stop · fuse</text>
  <path d="M1505 610H1530V892H1505" class="rededge"/>

  <rect x="70" y="970" width="18" height="18" rx="4" class="node"/><text x="98" y="984" class="legend">ROS node</text>
  <rect x="220" y="970" width="18" height="18" rx="4" class="topic"/><text x="248" y="984" class="legend">Topic / message</text>
  <rect x="410" y="970" width="18" height="18" rx="4" class="sensor"/><text x="438" y="984" class="legend">Hardware</text>
  <rect x="555" y="970" width="18" height="18" rx="4" class="external"/><text x="583" y="984" class="legend">Jetson 입력</text>
  <rect x="720" y="970" width="18" height="18" rx="4" class="safety"/><text x="748" y="984" class="legend">Safety / cutoff</text>
</svg>
