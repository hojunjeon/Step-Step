<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Jetson 보드 내부 ROS 2 노드·토픽 관계도</title>
  <desc id="desc">Jetson의 센서 드라이버, 인지, 위치 추정, 경로 계획, 명령 선택, 안전 검사 노드와 토픽 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#52606d"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#c62828"/></marker>
    <style>
      text{font-family:"Noto Sans KR","Malgun Gothic",Arial,sans-serif;fill:#172b4d}.title{font-size:34px;font-weight:800}.subtitle{font-size:18px;fill:#52606d}.section{font-size:21px;font-weight:700}.node{fill:#eaf2ff;stroke:#2563a6;stroke-width:2}.sensor{fill:#eef1f4;stroke:#607080;stroke-width:2}.topic{fill:#fff7df;stroke:#c48a00;stroke-width:2}.safety{fill:#fff0f0;stroke:#c62828;stroke-width:2}.external{fill:#f5efff;stroke:#7755aa;stroke-width:2}.label{font-size:17px;font-weight:700;text-anchor:middle}.small{font-size:14px;font-weight:500;text-anchor:middle;fill:#52606d}.edge{fill:none;stroke:#52606d;stroke-width:2.2;marker-end:url(#arrow)}.rededge{fill:none;stroke:#c62828;stroke-width:2.8;marker-end:url(#arrowRed)}.lane{fill:#f8fbff;stroke:#a8c7ea;stroke-width:2;stroke-dasharray:8 6}.legend{font-size:14px;fill:#334e68}
    </style>
  </defs>
  <rect width="1600" height="1050" fill="#ffffff"/>
  <text x="70" y="62" class="title">01. Jetson 보드 내부 ROS 2 관계</text>
  <text x="70" y="94" class="subtitle">Ubuntu 22.04 · native ROS 2 Humble · 인지 → 위치 추정 → 계획 → 최종 안전 승인</text>

  <rect x="45" y="125" width="1510" height="835" rx="24" class="lane"/>
  <text x="75" y="162" class="section">Jetson Orin Nano</text>

  <!-- Sensor drivers -->
  <rect x="80" y="210" width="200" height="80" rx="14" class="sensor"/><text x="180" y="242" class="label">USB Camera</text><text x="180" y="267" class="small">/dev/video*</text>
  <rect x="330" y="210" width="225" height="80" rx="14" class="node"/><text x="442" y="242" class="label">front_camera_node</text><text x="442" y="267" class="small">usb_cam</text>
  <rect x="605" y="210" width="210" height="80" rx="14" class="topic"/><text x="710" y="240" class="label">image_raw</text><text x="710" y="265" class="small">sensor_msgs/Image</text>
  <rect x="865" y="210" width="180" height="80" rx="14" class="node"/><text x="955" y="242" class="label">image_proc</text><text x="955" y="267" class="small">rectification</text>
  <rect x="1095" y="210" width="235" height="80" rx="14" class="node"/><text x="1212" y="240" class="label">tactile_path_node</text><text x="1212" y="265" class="small">점자블록 경로 인지</text>
  <rect x="1380" y="210" width="140" height="80" rx="14" class="topic"/><text x="1450" y="238" class="label">tactile_path</text><text x="1450" y="263" class="small">TactilePath</text>
  <path d="M280 250H330" class="edge"/><path d="M555 250H605" class="edge"/><path d="M815 250H865" class="edge"/><path d="M1045 250H1095" class="edge"/><path d="M1330 250H1380" class="edge"/>

  <rect x="80" y="345" width="200" height="80" rx="14" class="sensor"/><text x="180" y="377" class="label">YDLIDAR</text><text x="180" y="402" class="small">USB serial</text>
  <rect x="330" y="345" width="225" height="80" rx="14" class="node"/><text x="442" y="377" class="label">ydlidar_node</text><text x="442" y="402" class="small">Humble driver</text>
  <rect x="605" y="345" width="210" height="80" rx="14" class="topic"/><text x="710" y="375" class="label">/scan</text><text x="710" y="400" class="small">sensor_msgs/LaserScan</text>
  <path d="M280 385H330" class="edge"/><path d="M555 385H605" class="edge"/>

  <!-- External feedback and localization -->
  <rect x="80" y="490" width="250" height="110" rx="14" class="external"/><text x="205" y="522" class="label">RPi에서 수신</text><text x="205" y="550" class="small">/wheel/odom · Odometry</text><text x="205" y="575" class="small">/imu/data · Imu</text>
  <rect x="390" y="490" width="245" height="110" rx="14" class="node"/><text x="512" y="527" class="label">ekf_filter_node</text><text x="512" y="554" class="small">robot_localization</text><text x="512" y="579" class="small">odom → base_link 유일 발행자</text>
  <rect x="695" y="490" width="235" height="110" rx="14" class="topic"/><text x="812" y="527" class="label">/odometry/filtered</text><text x="812" y="554" class="small">nav_msgs/Odometry</text><text x="812" y="579" class="small">+ TF</text>
  <rect x="990" y="490" width="220" height="110" rx="14" class="node"/><text x="1100" y="527" class="label">route_manager_node</text><text x="1100" y="554" class="small">등록 경로·앞쪽 목표</text><text x="1100" y="579" class="small">/route/path · segment</text>
  <path d="M330 545H390" class="edge"/><path d="M635 545H695" class="edge"/><path d="M930 545H990" class="edge"/>

  <!-- Planning and command chain -->
  <rect x="1030" y="680" width="250" height="105" rx="14" class="node"/><text x="1155" y="715" class="label">rule_planner_node</text><text x="1155" y="742" class="small">tactile · route · scan · odom</text><text x="1155" y="767" class="small">Pure Pursuit + 속도 계획</text>
  <rect x="1325" y="680" width="195" height="105" rx="14" class="topic"/><text x="1422" y="715" class="label">autonomy_cmd</text><text x="1422" y="742" class="small">VehicleCommand</text><text x="1422" y="767" class="small">reliable · depth 1</text>
  <path d="M1450 290V640H1180V680" class="edge"/><path d="M710 425V650H1100V680" class="edge"/><path d="M1100 600V680" class="edge"/><path d="M1280 732H1325" class="edge"/>

  <rect x="80" y="680" width="210" height="105" rx="14" class="sensor"/><text x="185" y="715" class="label">Gamepad</text><text x="185" y="742" class="small">sensor_msgs/Joy</text><text x="185" y="767" class="small">deadman 입력</text>
  <rect x="335" y="680" width="225" height="105" rx="14" class="node"/><text x="447" y="715" class="label">manual_control_node</text><text x="447" y="742" class="small">scale · stale 검사</text><text x="447" y="767" class="small">manual_cmd</text>
  <rect x="605" y="680" width="205" height="105" rx="14" class="node"/><text x="707" y="715" class="label">command_mux_node</text><text x="707" y="742" class="small">manual &gt; autonomy</text><text x="707" y="767" class="small">proposed_cmd</text>
  <rect x="855" y="825" width="300" height="105" rx="14" class="safety"/><text x="1005" y="860" class="label">safety_supervisor_node</text><text x="1005" y="887" class="small">sensor · TF · freshness · 범위 검사</text><text x="1005" y="912" class="small">최종 승인자</text>
  <rect x="1210" y="825" width="310" height="105" rx="14" class="topic"/><text x="1365" y="860" class="label">/vehicle/target_cmd</text><text x="1365" y="887" class="small">step_step_interfaces/VehicleCommand</text><text x="1365" y="912" class="small">RPi로 송신 · reliable · depth 1</text>
  <path d="M290 732H335" class="edge"/><path d="M560 732H605" class="edge"/><path d="M1325 765H810" class="edge"/><path d="M707 785V877H855" class="edge"/><path d="M1155 877H1210" class="rededge"/>

  <rect x="80" y="835" width="250" height="90" rx="14" class="node"/><text x="205" y="868" class="label">system_monitor_node</text><text x="205" y="894" class="small">/system/heartbeat/jetson</text><text x="205" y="916" class="small">Heartbeat · best effort</text>

  <!-- Legend -->
  <rect x="70" y="985" width="18" height="18" rx="4" class="node"/><text x="98" y="999" class="legend">ROS node</text>
  <rect x="220" y="985" width="18" height="18" rx="4" class="topic"/><text x="248" y="999" class="legend">Topic / message</text>
  <rect x="410" y="985" width="18" height="18" rx="4" class="sensor"/><text x="438" y="999" class="legend">Hardware / input</text>
  <rect x="610" y="985" width="18" height="18" rx="4" class="external"/><text x="638" y="999" class="legend">다른 보드 입력</text>
  <rect x="800" y="985" width="18" height="18" rx="4" class="safety"/><text x="828" y="999" class="legend">Safety 경계</text>
</svg>
